<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>今日服务码</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; padding: 32px 18px; color: #1f2937; }
    main { max-width: 420px; margin: 0 auto; text-align: center; }
    .code { font-size: 44px; letter-spacing: 6px; font-weight: 800; margin: 24px 0; padding: 18px; border: 2px solid #111827; border-radius: 12px; }
    .muted { color: #6b7280; line-height: 1.6; }
    button { font-size: 18px; padding: 12px 18px; border: 0; border-radius: 8px; background: #111827; color: white; }
  </style>
</head>
<body>
  <main>
    <h1>今日服务码</h1>
    <p class="muted">请复制服务码，并在大众点评评价末尾带上这 4 位字符。</p>
    <div id="code" class="code">加载中</div>
    <button id="copy" type="button">复制服务码</button>
    <p id="status" class="muted"></p>
  </main>
  <script>
    const params = new URLSearchParams(location.search);
    const employee = params.get("e");
    const codeEl = document.getElementById("code");
    const statusEl = document.getElementById("status");
    fetch("./daily_codes.json", { cache: "no-store" })
      .then((response) => response.json())
      .then((data) => {
        const code = data.codes && data.codes[employee];
        if (!code) {
          codeEl.textContent = "未找到";
          statusEl.textContent = "请联系门店工作人员。";
          return;
        }
        codeEl.textContent = code;
        statusEl.textContent = "日期：" + data.date;
      })
      .catch(() => {
        codeEl.textContent = "加载失败";
        statusEl.textContent = "请稍后重试或联系门店工作人员。";
      });
    document.getElementById("copy").addEventListener("click", async () => {
      const code = codeEl.textContent.trim();
      if (!code || code === "加载中" || code === "未找到" || code === "加载失败") return;
      await navigator.clipboard.writeText(code);
      statusEl.textContent = "已复制：" + code;
    });
  </script>
</body>
</html>
